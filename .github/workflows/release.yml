name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  validate:
    uses: ./.github/workflows/validate.yml
    with:
      expected-version: ${{ github.ref_name }}

  release:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require tag on main
        run: |
          git fetch origin main
          git merge-base --is-ancestor ${{ github.sha }} origin/main \
            || { echo "Tag ${{ github.ref_name }} is not on main — aborting."; exit 1; }

      - name: Build agent kit archive
        run: |
          zip -r graph-sync-agent-kit-${{ github.ref_name }}.zip \
            .codex-plugin/ \
            .claude-plugin/ \
            .pre-commit-config.yaml \
            pyproject.toml \
            scripts/ \
            skills/ \
            README.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: graph-sync-agent-kit-${{ github.ref_name }}.zip
          generate_release_notes: true
